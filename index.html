<!DOCTYPE html>
<html lang="fr" x-data="{ 
    theme: localStorage.getItem('theme') || 'light',
    themes: ['light','dark','cupcake','bumblebee','emerald','corporate','synthwave','retro','cyberpunk','valentine','halloween','garden','forest','aqua','lofi','pastel','fantasy','wireframe','black','luxury','dracula','cmyk','autumn','business','acid','lemonade','night','coffee','winter','dim','nord'],
    get currentIndex() { return this.themes.indexOf(this.theme); },
    nextTheme() { 
        let idx = (this.currentIndex + 1) % this.themes.length;
        this.theme = this.themes[idx];
    },
    prevTheme() {
        let idx = (this.currentIndex - 1 + this.themes.length) % this.themes.length;
        this.theme = this.themes[idx];
    }
}" :data-theme="theme" x-init="$watch('theme', val => localStorage.setItem('theme', val))">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DaisyUI 31 Thèmes - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" />
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4b6cb7">
<link rel="apple-touch-icon" href="icon.png"></head>
<body class="min-h-screen bg-base-200 transition-colors duration-300">

    <div class="max-w-4xl mx-auto p-6">
        <header class="flex flex-col gap-4 mb-8">
            <h1 class="text-3xl font-bold">DaisyUI Theme Selector</h1>
            
            <div class="flex flex-wrap items-end gap-4">
                <div class="form-control w-full max-w-xs">
                    <label class="label"><span class="label-text">Choisir un thème :</span></label>
                    <select class="select select-bordered w-full" x-model="theme">
                        <option value="light">Light</option>
                        <option value="dark">Dark</option>
                        <option value="cupcake">Cupcake</option>
                        <option value="bumblebee">Bumblebee</option>
                        <option value="emerald">Emerald</option>
                        <option value="corporate">Corporate</option>
                        <option value="synthwave">Synthwave</option>
                        <option value="retro">Retro</option>
                        <option value="cyberpunk">Cyberpunk</option>
                        <option value="valentine">Valentine</option>
                        <option value="halloween">Halloween</option>
                        <option value="garden">Garden</option>
                        <option value="forest">Forest</option>
                        <option value="aqua">Aqua</option>
                        <option value="lofi">Lofi</option>
                        <option value="pastel">Pastel</option>
                        <option value="fantasy">Fantasy</option>
                        <option value="wireframe">Wireframe</option>
                        <option value="black">Black</option>
                        <option value="luxury">Luxury</option>
                        <option value="dracula">Dracula</option>
                        <option value="cmyk">Cmyk</option>
                        <option value="autumn">Autumn</option>
                        <option value="business">Business</option>
                        <option value="acid">Acid</option>
                        <option value="lemonade">Lemonade</option>
                        <option value="night">Night</option>
                        <option value="coffee">Coffee</option>
                        <option value="winter">Winter</option>
                        <option value="dim">Dim</option>
                        <option value="nord">Nord</option>
                    </select>
                </div>

                <!-- Boutons de navigation (haut) -->
                <div class="flex gap-2">
                    <button class="btn btn-outline btn-sm" @click="prevTheme()">⬅ Précédent</button>
                    <button class="btn btn-outline btn-sm" @click="nextTheme()">Suivant ➡</button>
                </div>
            </div>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="card bg-base-100 shadow-xl border border-base-300">
                <div class="card-body">
                    <h2 class="card-title">Boutons</h2>
                    <div class="flex flex-wrap gap-2">
                        <button class="btn btn-primary">Primary</button>
                        <button class="btn btn-secondary">Secondary</button>
                        <button class="btn btn-accent">Accent</button>
                    </div>
                </div>
            </div>

            <div class="card bg-base-100 shadow-xl border border-base-300">
                <div class="card-body">
                    <h2 class="card-title">Alertes</h2>
                    <div class="alert alert-info"><span>Ceci est une alerte info.</span></div>
                    <div class="alert alert-success"><span>Tout est configuré !</span></div>
                </div>
            </div>
        </main>

        <!-- Boutons de navigation (bas) -->
        <footer class="mt-12 pt-4 border-t border-base-300 flex justify-center gap-4">
            <button class="btn btn-outline" @click="prevTheme()">⬅ Précédent</button>
            <span class="self-center text-sm opacity-60">Thème actuel : <strong x-text="theme"></strong></span>
            <button class="btn btn-outline" @click="nextTheme()">Suivant ➡</button>
        </footer>
    </div>


<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));}</script>
</body>
</html>
